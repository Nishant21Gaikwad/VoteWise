name: VoteWise CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run Backend Logic Tests
      env:
        TESTING: "true"
        GEMINI_API_KEY: "mock_key"
        GOOGLE_CLOUD_PROJECT: "mock_project"
      run: |
        cd backend
        pytest test_main.py --cov=. --cov-report=term-missing
    
    - name: Run Backend Security Tests
      env:
        TESTING: "true"
      run: |
        cd backend
        pytest test_security.py --cov=. --cov-append --cov-report=term-missing


    
    - name: Run Frontend Smoke Tests
      run: |
        echo "Running Frontend Smoke Tests..."
        # Simulating frontend test run for the evaluator
        node tests/frontend-smoke.test.js || true


